<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riftbound Recorder</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="../../icons/icon48.png" alt="" width="24" height="24" />
    <span>Riftbound Recorder</span>
  </header>

  <div id="app">
    <!-- Diagnostic log — always visible, updated by JS -->
    <div id="diag" style="font-family:monospace;font-size:10px;padding:6px 10px;background:#0a0a14;color:#aaa;white-space:pre-wrap;word-break:break-all;min-height:40px;border-bottom:1px solid #2a2a4a;">Loading…</div>

    <!-- Main actions -->
    <section id="actions-section" style="display:none">
      <button id="btn-capture" class="btn primary">📸 Capture Turn</button>
      <button id="btn-end" class="btn danger">🏁 End &amp; Save Game</button>
      <button id="btn-reset" class="btn ghost">↺ Reset</button>
    </section>

    <!-- End-game form -->
    <section id="end-form" style="display:none">
      <h3>Save Game</h3>
      <label>Opponent
        <input id="input-opponent" type="text" placeholder="Opponent name" autocomplete="off" />
      </label>
      <label>Result</label>
      <div class="radio-group">
        <label><input type="radio" name="result" value="win" /> Win</label>
        <label><input type="radio" name="result" value="loss" /> Loss</label>
        <label><input type="radio" name="result" value="unknown" checked /> Unknown</label>
      </div>
      <div class="form-actions">
        <button id="btn-save-confirm" class="btn primary">Save</button>
        <button id="btn-save-cancel" class="btn ghost">Cancel</button>
      </div>
    </section>

    <!-- Debug panel -->
    <section id="debug-section">
      <button id="btn-debug" class="btn ghost" style="width:100%;font-size:11px;">🔍 Scan DOM</button>
      <div id="debug-output" style="display:none"></div>
    </section>
  </div>

  <!-- Non-module script: catches ALL errors including module crashes -->
  <script>
    var diag = document.getElementById('diag');
    function log(msg) {
      diag.textContent += '\n' + msg;
      console.log('[popup]', msg);
    }
    window.onerror = function(msg, src, line, col, err) {
      diag.style.color = '#e03b3b';
      log('JS ERROR: ' + msg + ' (' + src + ':' + line + ')');
      if (err && err.stack) log(err.stack);
    };
    window.addEventListener('unhandledrejection', function(e) {
      diag.style.color = '#e03b3b';
      log('UNHANDLED PROMISE: ' + e.reason);
    });
    log('HTML loaded, extension id: ' + (chrome && chrome.runtime && chrome.runtime.id || 'none'));
  </script>

  <script type="module" src="popup.ts"></script>
</body>
</html>
